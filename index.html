<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mine-Sweeper: Possession</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "nipplejs": "https://esm.sh/nipplejs"
            }
        }
    </script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
    </div>

    <div id="ui-layer">
        <div id="score-board">
            <div>Possessions: <span id="score">0</span></div>
            <div id="connection-status">Connecting...</div>
        </div>
        
        <div id="controls-hint">
            <p>Desktop: WASD to Move, SPACE to Sweep, F to Claim</p>
            <p>Mobile: Left Stick Move, Right Buttons</p>
        </div>

        <div id="mobile-controls">
            <div id="joystick-zone"></div>
            <div id="action-buttons">
                <button id="btn-sweep" class="action-btn">SWEEP</button>
                <button id="btn-claim" class="action-btn">CLAIM</button>
            </div>
        </div>

        <div id="notifications"></div>
    </div>

    <script type="module" src="src/main.js"></script>

</body>
</html>
